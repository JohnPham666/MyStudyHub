server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=studyhub;encrypt=true;trustServerCertificate=true
    username: sa
    password: 12345678
  jpa:
    hibernate.ddl-auto: validate     # KHÔNG dùng update — DB do Flyway quản
    properties:
      hibernate.dialect: org.hibernate.dialect.SQLServerDialect
      hibernate.type.preferred_instant_jdbc_type: TIMESTAMP
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:please-change-this-to-a-32-chars-secret-studyhub-2026-very-secure-key}
    access-ttl-seconds: 900           # 15 min
    refresh-ttl-seconds: 1209600      # 14 days
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:8081,https://*.lovable.app
