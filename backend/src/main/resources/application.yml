server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    # Lấy từ biến môi trường, nếu không có thì lấy link Supabase mặc định
    url: ${DB_URL:jdbc:postgresql://db.dqtatcpojfgbcppowgga.supabase.co:5432/postgres?sslmode=require}
    username: ${DB_USERNAME:postgres}
    # BẮT BUỘC dùng biến môi trường cho mật khẩu để không bị lộ trên Github
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate.ddl-auto: update # Chuyển sang update để tự động tạo bảng
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: true
      hibernate.type.preferred_instant_jdbc_type: TIMESTAMP
    open-in-view: false
  flyway:
    enabled: false # Tắt Flyway đi để tránh lỗi script SQL Server cũ

app:
  jwt:
    secret: ${JWT_SECRET:please-change-this-to-a-32-chars-secret-studyhub-2026-very-secure-key}
    access-ttl-seconds: 900           # 15 min
    refresh-ttl-seconds: 1209600      # 14 days
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:8081,https://*.lovable.app
